<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rent Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="home">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Rent Home</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="listings.html">Rooms</a>
        <a href="post-room.html">Post Room</a>
        <a href="auth.html" id="authLink">Login / Signup</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-simple">
        <h1>Find your room</h1>
        <form class="search-panel hero-search" id="homeSearchForm">
          <label class="sr-only" for="homeSearchInput">Search by location</label>
          <input type="text" id="homeSearchInput" placeholder="Search by location">
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>
    </section>

    <section class="section">
      <div class="container section-head">
        <div>
          <span class="eyebrow">Popular listings</span>
          <h2>Rooms you can explore today</h2>
        </div>
        <a class="text-link" href="listings.html">View all rooms</a>
      </div>
      <div class="container room-grid" id="homeRoomGrid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
